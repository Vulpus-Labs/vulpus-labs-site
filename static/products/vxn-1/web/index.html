<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VXN1</title>
<style>
/* Faceplate scaffold (0040). Mirrors the vizia editor's geometry from
   `target/vxn-layout.jsonl`: 1024×772 logical, 10px outer padding, 8px
   vertical gap between banner / preset-bar / 4×156 rows, 6px horizontal
   gap between panels in a row. CSS vars are named after the vxn-ui Rust
   constants so the mapping stays obvious; pixel literals stay out of
   selectors so a future resize policy is one variable change. */
:root {
  /* Palette (matches vxn-ui-vizia's STYLE block). */
  --face-bg: #2b2b2b;
  --panel-bg: #1c1c1c;
  --panel-border: #0e0e0e;
  --panel-corner: 4px;
  --header-bg: #a7cfe2;
  --header-fg: #141414;
  --banner-fg: #a7cfe2;
  --text: #d6d6d6;
  --ctl-label: #aeaeae;
  --ctl-value: #d9701b;          /* orange readout — Vizia .ctl-value */
  --track-bg: #0e0e0e;
  --track-fill: #d9701b;
  --thumb-bg: #87afb2;
  --thumb-border: #a7cfe2;       /* matches --glyph-active / --knob-indicator */
  --glyph: #888888;
  --glyph-active: #a7cfe2;
  --knob-face: #2a2a2a;
  --knob-rim: #444444;
  --knob-dimple: #222222;
  --knob-dimple-rim: #333333;
  --knob-indicator: #a7cfe2;       /* matches --glyph-active */

  /* Geometry (matches vxn-ui-vizia's PANEL_H / FADER_H / COL_H / DIAL plus
     row + chrome heights derived from `target/vxn-layout.jsonl`). */
  --editor-w: 1024px;
  --pad-outer: 10px;
  --banner-h: 26px;
  --preset-bar-h: 30px;
  --panel-h: 156px;           /* PANEL_H */
  --col-h: 120px;             /* COL_H — per-control column inside a panel */
  --fader-h: 74px;            /* FADER_H — fader travel */
  --dial: 62px;               /* DIAL — selector-knob box */
  --panel-pad: 5px;
  --panel-vgap: 4px;
  --row-vgap: 8px;
  --row-hgap: 6px;
  --header-h: 16px;
  --header-toggle-slot: 16px; /* reserves the Chorus/Delay header switch (0045) */
  --ctl-label-h: 12px;
  --ctl-value-h: 12px;
  --ctl-gap: 2px;
  --fader-track-w: 4px;
  --thumb-w: 18px;
  --thumb-h: 6px;
  --wave-knob-size: 64px;     /* matches the prototype's "Compact" variant */
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--face-bg);
  color: var(--text);
  font-family: "IBM Plex Sans Condensed", -apple-system, system-ui, sans-serif;
  /* Disable text selection across the faceplate — knobs / faders behave more
     like physical controls than text. */
  user-select: none;
  -webkit-user-select: none;
}

.faceplate {
  width: var(--editor-w);
  box-sizing: border-box;
  padding: var(--pad-outer);
  display: flex;
  flex-direction: column;
  gap: var(--row-vgap);
}

.banner {
  height: var(--banner-h);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  color: var(--banner-fg);
  font-size: 16px;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Preset bar (0049). Sits in the 30px row between banner and Row 1.
   Carries the current preset name, prev/next walker buttons over the
   combined Factory+User list, a Browse toggle (binds to 0050's browser
   panel), and a Save As button (opens the 0048 floating popup). The
   status chip is the same `.status-pill` primitive 0046 introduced —
   re-anchored from the lower-right corner to the right of the name
   (ticket §Notes). */
.preset-bar-slot {
  height: var(--preset-bar-h);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  box-sizing: border-box;
  color: var(--text);
}
.pbar-btn {
  /* 0020: palette vars (value-identical) so a theme tweak is one edit. */
  background: var(--knob-face);
  border: 1px solid var(--knob-rim);
  border-radius: 2px;
  color: var(--ctl-label);
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  height: 18px;
  cursor: pointer;
  user-select: none;
}
.pbar-btn:hover { border-color: var(--glyph-active); color: #ececec; }
.pbar-btn:disabled,
.pbar-btn:disabled:hover {
  opacity: 0.4;
  cursor: default;
  border-color: var(--knob-rim);
  color: var(--ctl-label);
}
.pbar-btn.active {
  background: #1f9cff;
  border-color: #84cdff;
  color: #fff;
}
.pbar-step { padding: 0 6px; min-width: 18px; text-align: center; }
.pbar-name {
  font-size: 12px;
  color: var(--ctl-value);
  font-weight: 600;
  letter-spacing: 0.5px;
  min-width: 150px;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pbar-spacer { flex: 1 1 auto; }

/* `.faceplate` is the positioned anchor for body-level popups. The preset
   browser panel markup + CSS now live in the shared crate
   (vxn_core_ui_web::PRESET_BROWSER_CSS, appended to this sheet at splice). */
.faceplate { position: relative; }

.row {
  display: flex;
  gap: var(--row-hgap);
  height: var(--panel-h);
}

.panel {
  position: relative;             /* anchor for absolutely-placed .panel-strip */
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  padding: var(--panel-pad);
  display: flex;
  flex-direction: column;
  gap: var(--panel-vgap);
  min-width: 0;
  flex: 1 1 0;
  box-sizing: border-box;
}

/* Per-row stretch shares — pulled from `panel_view`'s `match title` block
   in `crates/vxn-ui-vizia/src/lib.rs`. flex-basis is 0 so `flex-grow`
   gives a pure ratio. Bend is the only fixed-width panel. */
.row-1 .panel[data-name="LFO 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="LFO 2"]  { flex-grow: 0.7; }
.row-1 .panel[data-name="Osc 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Osc 2"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Mixer"]  { flex-grow: 1.1; }

.row-2 .panel[data-name="Env 1"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="Env 2"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="VCA"]        { flex-grow: 0.75; }
.row-2 .panel[data-name="Filter"]     { flex-grow: 1.15; }
.row-2 .panel[data-name="Filter Mod"] { flex-grow: 1.0; }

.row-3 .panel[data-name="Pitch Mod"] { flex-grow: 1.2; }
.row-3 .panel[data-name="PWM Mod"]   { flex-grow: 1.0; }
.row-3 .panel[data-name="Cross Mod"] { flex-grow: 0.55; }
.row-3 .panel[data-name="Mod Wheel"] { flex-grow: 1.2; }
.row-3 .panel[data-name="Bend"] { flex: 0 0 54px; }

/* Row 4 — four panels (Keys / Voice / FX / Master). FX hosts at most one
   tabbed pane (4 faders + tab strip) at a time, so narrowing it from its
   original tri-panel share (2.65) lets Keys / Voice / Master claim the
   freed space proportionally. */
.row-4 .panel[data-name="Keys"]   { flex-grow: 1.25; }
.row-4 .panel[data-name="Voice"]  { flex-grow: 1.25; }
.row-4 .panel[data-name="FX"]     { flex-grow: 1.70; }
.row-4 .panel[data-name="Master"] { flex-grow: 1.65; }

.panel-header {
  height: var(--header-h);
  background: var(--header-bg);
  color: var(--header-fg);
  border-radius: 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

.panel[data-header-toggle] .panel-header {
  justify-content: flex-start;
  padding-left: 3px;
  gap: 4px;
}
.panel[data-header-toggle] .panel-header-toggle-slot {
  width: var(--header-toggle-slot);
  height: var(--header-toggle-slot);
  flex: 0 0 var(--header-toggle-slot);
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel[data-header-toggle] .panel-header-title {
  flex: 1 1 auto;
  text-align: center;
  margin-right: var(--header-toggle-slot);
}

.panel-body {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 4px;
  align-items: stretch;
  justify-content: space-evenly;
}
/* Panels whose first body child is a selector buttongroup anchor it to the
   panel's left edge so the distance from panel padding → first button is
   uniform across Filter / Cross Mod / Reverb. Subsequent faders flow with
   a fixed gap rather than the body's default `space-evenly`. */
.panel-body:has(> .ctl-buttongroup:first-child) {
  justify-content: flex-start;
  gap: 10px;
}
/* Left-anchored buttongroup left-aligns its own contents too so the box
   edge sits at `--panel-pad` regardless of label / row widths — keeps the
   distance from panel border to first selector uniform across panels. */
.panel-body > .ctl-buttongroup:first-child {
  align-items: flex-start;
}

/* ── Control primitives (0041) ──────────────────────────────────────────── */

/* Common cell — a vertical stack of label, control, value. */
.ctl {
  position: relative;          /* anchor for the absolute .ctl-value popup */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}

.ctl-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
  margin-bottom: 4px;
}

/* `.value-pop` moved to the shared `vxn-core-ui-web/assets/value-pop.css`
   (0140); appended to this faceplate's `<style>` at splice time. */

/* Status pill (0046) — inline chip in the preset bar, right of the
   current name (0049 §Notes). Driven by the controller's `Status { line }`
   ViewEvent (clamp warnings on preset load, save / load messages). Fades
   after ~3s; pure CSS animation so the JS side just sets the line and
   toggles the `visible` class. */
.status-pill {
  background: var(--track-bg); /* 0020: was #0e0e0e (value-identical) */
  border: 1px solid var(--glyph-active);
  border-radius: 3px;
  padding: 2px 8px;
  font-size: 10px;
  color: #f6f6f6;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 240ms ease-out;
}
.status-pill.visible { opacity: 1; }

/* Fader — vertical track + thumb. Pointer ops issue Begin/EndGesture
   brackets so the host's automation lane records as one event, not a
   pixel storm. */
.ctl-fader {
  position: relative;
  width: var(--thumb-w);
  height: var(--fader-h);
  cursor: ns-resize;
  /* Hit area extends slightly past the track so a near-miss still grabs. */
  touch-action: none;
}
.ctl-fader-track {
  position: absolute;
  left: calc((var(--thumb-w) - var(--fader-track-w)) / 2);
  top: 0;
  width: var(--fader-track-w);
  height: 100%;
  /* Below-thumb portion paints lighter than above so the slider reads
     as filled. `--fader-norm` (0..1) is set by setThumb on the cell. */
  background: linear-gradient(
    to top,
    #3a3a3a 0,
    #3a3a3a calc(var(--fader-norm, 0) * 100%),
    var(--track-bg) calc(var(--fader-norm, 0) * 100%),
    var(--track-bg) 100%
  );
  border-radius: 2px;
}
.ctl-fader-track::before {
  content: '';
  position: absolute;
  left: -3px;
  right: -3px;
  top: 50%;
  transform: translateY(-50%);
  height: 3px;
  background: #3a3a3a;
}
.ctl-fader-thumb {
  position: absolute;
  left: 0;
  width: var(--thumb-w);
  height: var(--thumb-h);
  box-sizing: border-box;
  background: var(--thumb-bg);
  border: 2px solid var(--thumb-border);
  border-radius: 1px;
  transform: translateY(-50%);
  top: 50%;
  pointer-events: none;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.15);
}
.ctl-fader.dragging .ctl-fader-thumb {
  box-shadow: 0 0 6px var(--ctl-value);
}

/* Rotary waveform selector (0041). SVG-based: knob face + rotating
   indicator + glyph labels arranged at the corners (SW/NW/NE/SE) outside
   the rim. All visuals + hit-testing live in the SVG; no DOM children to
   reflow. Layout stability comes for free — the dial occupies a fixed
   square (--wave-knob-size) regardless of state. */
.ctl-wave {
  width: var(--wave-knob-size);
  height: var(--wave-knob-size);
  cursor: grab;
  touch-action: none;
}
.ctl-wave.dragging { cursor: grabbing; }

/* Bottom strip — selector/toggle controls (NoiseColor, FilterSlope, etc.)
   relocated into the panel's free clearance below the main column row.
   Absolutely placed so it never grows the panel or competes with ctl
   columns for flex space. Mirrors the vizia editor's strip placement
   (left: 8px, bottom: 4px). */
.panel-strip {
  position: absolute;
  left: 8px;
  bottom: 4px;
  right: 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  pointer-events: none;           /* empty space passes through to body */
}
.panel-strip > * { pointer-events: auto; }

/* Master's strip stacks Oversample (horizontal toggle row) over Limit
   (single toggle) — `panel-strip` defaults to a single horizontal row,
   so this is the one panel that overrides it. */
.master-strip {
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
}

/* ── FX panel (E018 / 0098) — tabbed Phaser/Chorus/Delay/Reverb ──────── */

/* Body layout: vertical tab strip on the left, active pane on the right.
   `.panel-body` default `space-evenly` would distribute the strip + four
   panes; flex-start keeps the strip at the left edge and lets the active
   pane take the remaining space. */
.panel[data-name="FX"] .fx-body {
  flex-direction: row;
  justify-content: flex-start;
  align-items: stretch;
  gap: 6px;
}

/* Four tab buttons stacked vertically. Each tab carries its own on/off
   switch inside the button (left slot) — clicking the switch toggles
   the *_on param; clicking elsewhere on the tab swaps the active pane.
   Width tuned to fit "REVERB" + the switch slot. */
.panel[data-name="FX"] .fx-tabs {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 3px;
  flex: 0 0 52px;
  padding-top: 8px;
}
.panel[data-name="FX"] .fx-tab {
  background: transparent;
  border: 0;
  border-left: 2px solid transparent;
  color: var(--ctl-label);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.5px;
  padding: 0 4px 0 6px;
  cursor: pointer;
  flex: 1 1 0;
  min-height: 0;
  text-transform: uppercase;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
}
.panel[data-name="FX"] .fx-tab:hover { color: #d4d4d4; }
.panel[data-name="FX"] .fx-tab.active {
  border-left-color: #84cdff;
  color: #ececec;
}
.panel[data-name="FX"] .fx-tab-switch {
  /* Override `.panel[data-header-toggle] .panel-header-toggle-slot`'s
     header-sized box — the in-tab switch is smaller and sits flush in
     the tab's left padding. */
  width: 12px;
  height: 12px;
  flex: 0 0 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel[data-name="FX"] .fx-tab-label {
  flex: 1 1 auto;
  text-align: center;
  pointer-events: none;
}

/* Tab panes: 4-column grid so a fader's horizontal slot is the same
   across tabs (cells don't shift when the active tab changes). Row 1
   holds the fader columns; row 2 is reserved for per-pane strip
   controls (delay's Sync sits under Time). Last column carries the Mix
   fader on every tab that has one, so Mix lines up too. */
.panel[data-name="FX"] .fx-pane {
  display: none;
  flex: 1 1 auto;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-template-rows: 1fr 22px;
  column-gap: 6px;
  row-gap: 2px;
  min-width: 0;
  min-height: 0;
  position: relative;
}
/* `.ctl` defaults to a fixed 120 px column height that would push the
   bottom strip row outside the FX panel's body clearance. Inside the
   FX pane the cells size to their natural label+fader stack and pin
   to the top of their grid row, so the reserved strip row stays
   visible below. */
.panel[data-name="FX"] .fx-pane > .ctl {
  height: auto;
  align-self: start;
}
.panel[data-name="FX"][data-active-tab="phaser"] .fx-pane-phaser { display: grid; }
.panel[data-name="FX"][data-active-tab="chorus"] .fx-pane-chorus { display: grid; }
.panel[data-name="FX"][data-active-tab="delay"]  .fx-pane-delay  { display: grid; }
.panel[data-name="FX"][data-active-tab="reverb"] .fx-pane-reverb { display: grid; }

/* Mix always rides the rightmost column so the Mix fader sits in the
   same x-slot across all four tabs (chorus/delay have one gap before
   it; phaser/reverb fill the gap with FB/Damp). */
.panel[data-name="FX"] .fx-pane-chorus > [data-param="chorus_mix"],
.panel[data-name="FX"] .fx-pane-delay  > [data-param="delay_mix"] {
  grid-column: 4;
}

/* Delay Sync rides row 2, column 1 — directly below the Time fader,
   matching the LFO panels' "fader on top, sync below" layout.
   `align-self: start` pins it to row 2's top so it sits level with the
   bottom (Reverb) tab in the left tab strip instead of dropping to the
   panel floor. */
.panel[data-name="FX"] .fx-pane-delay > [data-param="delay_sync"] {
  grid-row: 2;
  grid-column: 1;
  justify-self: center;
  align-self: start;
}


/* Toggle row — small box + inline label. Matches vizia .tg-row /
   .tg-box / .tg-lbl exactly (#1f9cff active fill, 9×9 box, 7 px label). */
.ctl-tg-row {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.ctl-tg-box {
  width: 11px;
  height: 11px;
  background: #4a4a4a;
  border: 1px solid #8a8a8a;
  border-radius: 2px;
  box-sizing: border-box;
}
.ctl-tg-row:hover .ctl-tg-box { border-color: #c4c4c4; }
.ctl-tg-row.active .ctl-tg-box {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}
.ctl-tg-lbl {
  font-size: 9px;
  color: #9a9a9a;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 700;
}
.ctl-tg-row.active .ctl-tg-lbl { color: #ececec; }

/* ButtonGroup — rendered exactly like a strip of toggles (same `.ctl-tg-row`
   children) but inside a normal column with a label on top. Used for
   Oversample / CrossModType / AssignMode. */
.ctl-buttongroup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-buttongroup .ctl-tg-rows {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-start;
}

/* Dropdown — native <select> styled to match the dark palette. Fallback for
   enums that don't fit ButtonGroup (too many variants, or a long name list). */
.ctl-dropdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-dropdown select {
  background: #1c1c1c;
  color: var(--text);
  border: 1px solid #444;
  border-radius: 2px;
  font-family: inherit;
  font-size: 10px;
  padding: 1px 4px;
}
.ctl-dropdown select:focus { outline: 1px solid var(--ctl-value); }

/* Dimmed — applied to control cells whose param is gated by a sibling
   (LFO 1's Delay/Fade dim while Free is on; Filter Slope dims when the
   mode is Notch, where the DSP's `FilterMode::mix` ignores slope, see
   vxn-dsp/src/ota_ladder.rs). Visual-only: pointer events still pass
   through so DAW automation echoes still move the thumb. Same selector
   covers both panel-body (`.ctl`) and panel-strip (`.ctl-strip`)
   mounts. */
.ctl.dimmed, .ctl-strip.dimmed, .route-col.dimmed { opacity: 0.4; }

/* Mod-route column (0044): one column header (LFO / Env) over a
   horizontal pair — source selector on the left, depth fader on the
   right — mirroring vxn_ui_vizia's `mod_route_view`. The child
   buttongroup omits its own label (kept structurally for the variant
   rows) since the route header already names the source. */
.route-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.route-col-head {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
  /* Matches `.ctl-label`'s margin so faders under a route header line up
     vertically with faders that sit under a per-control label. */
  margin-bottom: 4px;
}
.route-col-body {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 6px;
}
.route-col .ctl {
  height: auto;
}
/* Source buttongroup + detached Mod switch (Pitch Mod, 0063): the Mod
   switch sits at the bottom of the source selector stack (Pitch LFO Mod
   / Pitch Env Mod divert their route to the cross-mod modulator). It's
   a separate child of `.route-col-src` rather than a buttongroup row so
   its semantics stay distinct, and an extra top margin inserts a blank-
   row-sized gap above it to read as "not part of the selection group". */
.route-col-src {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}
.route-col-src > .ctl[data-control="switch"] {
  margin-top: 17px;
}

/* Header-switch box (Chorus / Delay, 0045) — a small toggle child of
   `.panel-header-toggle-slot`. Sized to sit *inside* the 16 px header
   bar, not fill it, so the box reads as a control on the header rather
   than the header's whole left edge. Palette matches `.ctl-tg-box` but
   the inactive border picks up a header-tinted shade so it reads as
   part of the header chrome. */
.panel-header-switch {
  width: 10px;
  height: 10px;
  background: #4a4a4a;
  border: 1px solid #2c4a59;
  border-radius: 2px;
  box-sizing: border-box;
  cursor: pointer;
}
.panel-header-switch:hover { border-color: #141414; }
.panel-header-switch.active {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}

/* Voice panel's Detune column — a normal fader column. The Legato toggle
   is created inside the cell by `makeDetuneLegato` but absolute-positioned
   to the panel's bottom-left corner, so the detune column itself reads as
   a plain fader column width-wise (0045). `position: static` overrides the
   `.ctl` base's `position: relative` so the absolute legato child escapes
   up to `.panel` (the nearest remaining positioned ancestor) instead of
   anchoring to this cell. */
.ctl-detune {
  position: static;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.ctl-detune-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.ctl-detune-legato {
  position: absolute;
  bottom: var(--panel-pad);
  left: var(--panel-pad);
}
.ctl-detune-legato.disabled { opacity: 0.4; pointer-events: none; }

/* Keys panel (0053): mode/edit toggle columns side by side, split slider
   + note-name readout below, Reset button at the bottom. Mirrors the
   vizia editor's `keys_panel` shape (mode column on the left, edit column
   on the right, split slider spanning, Reset stretched full-width). The
   edit column and the split row reserve their layout slot via
   `visibility: hidden` rather than `display: none` so the Reset never
   shifts when the mode flips. */
.keys-body {
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  gap: 8px;
  padding: 4px 6px 4px 6px;
}
.keys-top {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 12px;
}
.keys-tg-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  align-items: flex-start;
}
.keys-tg-list .ctl-tg-row { padding: 1px 0; }
.keys-split-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
}
.keys-split-label {
  font-size: 9px;
  font-weight: 800;
  color: var(--ctl-label);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
/* Per-layer level sliders (Upper / Lower). One label + a horizontal
   track with a draggable thumb. The thumb's `left` is set in px from
   norm by the panel JS, so the track defines both the visual band and
   the hit area for the drag. */
.keys-level-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
}
.keys-level-lbl {
  font-size: 9px;
  font-weight: 800;
  color: var(--ctl-label);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  width: 32px;
  flex: 0 0 32px;
}
.keys-level-track {
  position: relative;
  flex: 1 1 auto;
  height: 12px;
  background: var(--track-bg);
  border-radius: 2px;
  cursor: pointer;
  touch-action: none;
}
.keys-level-thumb {
  position: absolute;
  top: 50%;
  width: 6px;
  height: 14px;
  background: var(--thumb-bg);
  border: 2px solid var(--thumb-border);
  border-radius: 1px;
  box-sizing: border-box;
  transform: translate(-50%, -50%);
  /* `left` (in %) is written by `wireLayerLevels` so the thumb follows
     param echoes — including DAW automation. Initial 100 % = unity. */
  left: 100%;
  pointer-events: none;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.15);
}
/* `.dimmed` already greys via opacity (shared rule). Block pointer ops on
   the parked Keys controls so a click in Whole/Dual can't move the split
   slider or flip the edit-layer toggle. */
.keys-tg-list.dimmed,
.keys-split-row.dimmed {
  opacity: 0.4;
  pointer-events: none;
}
.keys-split-slider {
  flex: 1 1 auto;
  height: 14px;
  margin: 0;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
}
.keys-split-slider::-webkit-slider-runnable-track {
  height: 4px;
  background: var(--track-bg);
  border-radius: 2px;
}
.keys-split-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 10px;
  height: 14px;
  background: var(--thumb-bg);
  border: 2px solid var(--thumb-border);
  border-radius: 1px;
  margin-top: -5px;
}
.keys-split-slider:focus { outline: none; }
.keys-split-readout {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-value);
  letter-spacing: 0.5px;
  min-width: 22px;
  text-align: right;
}
.keys-reset {
  height: 16px;
  background: #333333;
  color: #b0b0b0;
  border: 1px solid #555555;
  border-radius: 2px;
  font-family: inherit;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: auto;
}
.keys-reset:hover {
  background: #3a3a3a;
  border-color: #c4c4c4;
  color: #ececec;
}

/* Shared preset browser panel. Floating two-pane folders/presets list,
 * anchored to the editor viewport, ported from VXN1. Outside-click + ESC
 * dismiss; content scrolls inside each pane. Embedded by each synth's
 * faceplate crate; the synth's own stylesheet must make its faceplate root
 * `position: relative` (or the panel anchors to the viewport, which is
 * equivalent when the editor fills the WebView). */
.browser-panel[hidden],
.browser-backdrop[hidden] { display: none !important; }
.browser-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  /* Invisible — swallows outside clicks and routes them to close. */
}
.browser-panel {
  position: fixed;
  top: calc(var(--pad-outer) + var(--banner-h) + var(--row-vgap)
           + var(--preset-bar-h) + var(--row-vgap));
  left: var(--pad-outer);
  width: 760px;
  max-width: calc(var(--editor-w) - 2 * var(--pad-outer));
  height: 420px;
  z-index: 60;
  background: var(--panel-bg);
  border: 1px solid var(--ctl-value);
  border-radius: var(--panel-corner);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
  padding: 8px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.browser-close {
  position: absolute;
  top: 6px;
  right: 8px;
  z-index: 1;
  background: transparent;
  border: none;
  color: var(--ctl-label);
  font: inherit;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
  cursor: pointer;
  user-select: none;
}
.browser-close:hover { color: #ececec; }
.browser-search {
  position: relative;
  height: 22px;
  flex: 0 0 auto;
  width: 220px;
}
.browser-search input {
  width: 100%;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  height: 22px;
  padding: 0 22px 0 6px;
  box-sizing: border-box;
  outline: none;
}
.browser-search input:focus { border-color: var(--glyph-active); }
.browser-search-clear {
  position: absolute;
  top: 50%;
  right: 4px;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 2px;
  color: var(--ctl-label);
  font-family: inherit;
  font-size: 12px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  user-select: none;
}
.browser-search-clear:hover { color: #ececec; }
.browser-panes {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 6px;
}
.browser-pane {
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  overflow-y: auto;
  padding: 2px;
  box-sizing: border-box;
}
.browser-pane-folders { width: 220px; flex: 0 0 220px; }
.browser-pane-presets { flex: 1 1 auto; }
.browser-section {
  font-size: 9px;
  color: var(--ctl-value);
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 6px 4px 4px;
  height: 22px;
  box-sizing: border-box;
  display: flex;
  align-items: flex-end;
}
.browser-row {
  font-size: 12px;
  color: var(--text);
  padding: 3px 8px;
  border-radius: 2px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 16px;
}
.browser-row:hover { background: #1c1c1c; }
.browser-row.selected {
  background: #1c1c1c;
  color: #ececec;
  box-shadow: inset 2px 0 0 var(--ctl-value);
}
.browser-row.current {
  color: var(--ctl-value);
  font-weight: 600;
}
/* HTML5 DnD: dim the dragged source row, highlight a valid drop folder, dim
 * the source folder when hovered (no-op drop). */
.browser-row.dragging { opacity: 0.5; }
.browser-row.drag-over {
  background: #2a2a2a;
  color: #ececec;
  box-shadow: inset 2px 0 0 var(--glyph-active);
}
.browser-row.drag-blocked {
  opacity: 0.4;
  cursor: not-allowed;
}
/* Search rows: name + muted origin label so cross-folder matches read
 * unambiguously. */
.browser-row.search-row { display: flex; align-items: baseline; gap: 8px; }
.browser-row.search-row .browser-row-name {
  flex: 1 1 auto;
  overflow: hidden;
  text-overflow: ellipsis;
}
.browser-row.search-row .browser-row-origin {
  flex: 0 0 auto;
  font-size: 10px;
  color: var(--ctl-label);
  letter-spacing: 0.3px;
}
.browser-empty {
  font-size: 11px;
  color: var(--ctl-label);
  padding: 8px;
  font-style: italic;
}
/* "+ New" button on the USER section header. */
.browser-section-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-right: 4px;
}
.browser-section-row .browser-section { flex: 1 1 auto; padding-right: 0; }
.browser-new-folder {
  flex: 0 0 auto;
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 2px;
  color: var(--ctl-label);
  font: inherit;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 1px 5px;
  height: 16px;
  cursor: pointer;
  user-select: none;
  margin-bottom: 4px;
}
.browser-new-folder:hover { border-color: var(--glyph-active); color: #ececec; }

/* Right-click context menu. Mounts inside the panel, positioned at the
 * click. The "Move to ▸" submenu shows on hover via CSS. */
.browser-menu {
  position: absolute;
  z-index: 70;
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: 2px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  padding: 2px 0;
  min-width: 120px;
}
.browser-menu-item {
  position: relative;
  font-size: 12px;
  color: var(--text);
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.browser-menu-item:hover { background: #2a2a2a; }
.browser-menu-item.has-submenu::after {
  content: '▸';
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ctl-label);
  font-size: 10px;
}
.browser-submenu {
  display: none;
  position: absolute;
  left: 100%;
  top: -3px;
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: 2px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  padding: 2px 0;
  min-width: 120px;
  max-height: 240px;
  overflow-y: auto;
}
.browser-menu-item.has-submenu:hover > .browser-submenu { display: block; }
.browser-submenu-item {
  font-size: 12px;
  color: var(--text);
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.browser-submenu-item:hover { background: #2a2a2a; }
.browser-submenu-empty {
  font-size: 11px;
  color: var(--ctl-label);
  padding: 4px 12px;
  font-style: italic;
}
/* Confirm + Save As modals. Mounted on the faceplate root; fixed overlay
 * above the panel. */
.browser-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: rgba(0, 0, 0, 0.55);
}
.browser-modal {
  position: fixed;
  z-index: 81;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: var(--panel-corner);
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.6);
  padding: 14px 18px;
  min-width: 260px;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.browser-modal-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--ctl-value);
}
.browser-modal-body {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  word-break: break-word;
}
.browser-modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}
.browser-modal-btn {
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 2px;
  color: var(--ctl-label);
  font: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
}
.browser-modal-btn:hover { border-color: var(--glyph-active); color: #ececec; }
.browser-modal-btn.danger { border-color: #ff5050; color: #ff7676; }
.browser-modal-btn.danger:hover { background: #2a1414; color: #ffb0b0; }
.browser-modal-btn.disabled,
.browser-modal-btn:disabled { opacity: 0.4; pointer-events: none; }
/* Save As form: two label + control rows. */
.save-as-body { display: flex; flex-direction: column; gap: 8px; min-width: 320px; }
.save-as-row { display: flex; align-items: center; gap: 8px; }
.save-as-label {
  flex: 0 0 56px;
  font-size: 10px;
  color: var(--ctl-label);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.save-as-name {
  flex: 1 1 auto;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.save-as-name.placeholder { color: var(--ctl-label); font-style: italic; }
.save-as-select {
  flex: 1 1 auto;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  height: 24px;
  padding: 0 6px;
  cursor: pointer;
}
.save-as-select:focus { outline: none; border-color: var(--glyph-active); }

/* Floating value popup — one shared <div> across every control, anchored
   at the pointer's entry / grab point in fixed coords so it floats above
   the layout and can never push siblings around or be clipped by a panel's
   overflow. Shared ruleset (0140): replaces the per-synth `.value-pop`
   copies in VXN1 `faceplate.css` and VXN2 `style.css`.

   `--track-bg` and `--ctl-value` are theme custom properties both synths
   define (VXN1 `faceplate.css`, VXN2 `style.css`); the fallback keeps the
   rule valid if a host page omits them. */
.value-pop {
  position: fixed;
  display: none;
  pointer-events: none;
  background: var(--track-bg, #0e0e0e);
  border: 1px solid var(--ctl-value);
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 10px;
  color: #f6f6f6;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  z-index: 1000;
}

</style>
</head>
<body>
<div class="faceplate" id="faceplate">

  <div class="banner">VULPUS LABS &mdash; VXN-1</div>

  <!-- Preset bar (0049). Prev/next walk the combined Factory + User
       list (controller-side via UiEvent::StepPreset); Browse toggles a
       view-side `browserOpen` flag 0050 will bind a panel to; Save As
       opens the 0048 floating popup, commits with `folder: null`
       (defaults to user root until 0051 ties browser selection in). -->
  <div class="preset-bar-slot" id="preset-bar-slot">
    <button class="pbar-btn pbar-step" id="pbar-prev" type="button" aria-label="Previous preset">&lt;</button>
    <div class="pbar-name" id="pbar-name"></div>
    <button class="pbar-btn pbar-step" id="pbar-next" type="button" aria-label="Next preset">&gt;</button>
    <button class="pbar-btn" id="pbar-browse" type="button">Browse</button>
    <button class="pbar-btn" id="pbar-save-overwrite" type="button" disabled>Save</button>
    <button class="pbar-btn" id="pbar-save" type="button">Save As</button>
    <div class="pbar-spacer"></div>
    <div class="status-pill" id="pbar-status"></div>
  </div>

  <!-- Preset browser panel (0050). Two-pane folders / presets list with a
       case-insensitive substring search across the selected folder. Hidden
       until the preset bar's Browse toggle flips on; populated from the
       controller's corpus snapshot pushed via
       `window.__vxn.applyPresetCorpus`. -->
  <div class="browser-backdrop" id="browser-backdrop" hidden></div>
  <div class="browser-panel" id="browser-panel" hidden>
    <button class="browser-close" id="browser-close" type="button" aria-label="Close browser">&times;</button>
    <div class="browser-search">
      <input type="text" id="browser-search-input" placeholder="Search…" autocomplete="off" />
      <button class="browser-search-clear" id="browser-search-clear" type="button" aria-label="Clear search">&times;</button>
    </div>
    <div class="browser-panes">
      <div class="browser-pane browser-pane-folders" id="browser-folders"></div>
      <div class="browser-pane browser-pane-presets" id="browser-presets"></div>
    </div>
  </div>

  <!-- Row 1 — LFOs, oscillators, mixer. -->
  <div class="row row-1" data-row="1">
    <!-- LFO 1 (0042): per-voice. Shape (rotary) + Rate/Delay/Fade faders in
         the main row; Sync + Free toggles in the bottom strip (matches the
         vizia layout via `in_bottom_strip`). Free is a quirk — when on, it
         keeps the LFO free-running and the Delay/Fade cells dim. -->
    <div class="panel" data-name="LFO 1" data-layered>
      <div class="panel-header">LFO 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_delay_time" data-label="Delay"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_fade" data-label="Fade"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="lfo1_free_run" data-label="Free"></div>
      </div>
    </div>
    <!-- LFO 2 (0042): one global oscillator. Shape + Rate up top, Sync in
         the strip. Not layer-aware — params come from GLOBAL_PARAMS. -->
    <div class="panel" data-name="LFO 2">
      <div class="panel-header">LFO 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo2_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo2_rate" data-label="Rate"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo2_sync" data-label="Sync"></div>
      </div>
    </div>
    <!-- Osc 1 (0041): Wave (rotary) + 4 faders. Layer hard-bound to Upper —
         the edit-layer toggle lands with the Voice panel in 0045. The faders
         resolve by descriptor name, not CLAP id, so a `vxn_app::PatchParam`
         reorder doesn't desync the HTML. -->
    <div class="panel" data-name="Osc 1" data-layered>
      <div class="panel-header">OSC 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc1_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc1_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc1_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc1_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc1_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Osc 2 (0041a): identical control set to Osc 1, different param IDs. -->
    <div class="panel" data-name="Osc 2" data-layered>
      <div class="panel-header">OSC 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc2_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc2_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc2_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc2_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc2_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Mixer (0041a, 0061, 0062): four level faders + Col (White/Pink) switch
         in the bottom strip. NoiseColor is a 2-variant enum; the Switch
         primitive renders it as two exclusive labelled toggles. Ring lives on
         the XMod panel's CrossModType — when engaged it displaces osc1 in this
         strip. Sub is a Juno-style square one octave below osc1 (osc2 under
         Sync), phase-locked to the source's flipflop. -->
    <div class="panel" data-name="Mixer" data-layered>
      <div class="panel-header">MIXER</div>

        <div class="ctl" data-control="fader" data-param="env1_release" data-label="R"></div>

      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env1_shape" data-label="Shape"></div>
      </div>
    </div>
    <div class="panel" data-name="Env 2" data-layered>

        <div class="ctl" data-control="fader" data-param="env2_sustain" data-label="S"></div>

    <div class="panel" data-name="Filter" data-layered>
      <div class="panel-header">FILTER</div>

      <div class="panel-header">FILTER MOD</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="vel_cutoff_depth" data-label="Vel"></div>

        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">

            <div class="ctl" data-control="fader" data-param="pwm_lfo_depth" data-dim-when-src-off="pwm_lfo_src" data-no-label></div>

        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pwm_env_src" data-label="Env" data-no-label></div>

    <!-- Cross Mod (0044): Type {Off/Sync/FM} sits beside its Amount fader.

         the cross-mod modulator: slave/osc1 under Sync, modulator/osc2 under
         FM); mod-wheel routing to sweep stays in the Mod Wheel panel.
         The descriptor labels Pulse-Modulation as "FM" — players expect that
         name (ADR 0004 §3); the ticket's "Off/Sync/PM" maps onto the same
         three variants. -->
    <div class="panel" data-name="Cross Mod" data-layered>

         generic `data-control` dispatcher: none of these are params. -->
    <div class="panel" data-name="Keys">
      <div class="panel-header">KEYS</div>
      <div class="panel-body keys-body"></div>

         top (50 ct Unison, 20 ct Twin) and the Legato toggle drawn beneath the

         detune-legato primitive handles both params. -->
    <div class="panel" data-name="Voice" data-layered>

      <div class="panel-body">

// Floating value popup — one shared <div> across every control, anchored
// at the pointer's first relevant position (entry for hover, grab for
// drag) so the popup stays put while the indicator moves. `fixed`
// positioning + body-level mount means it can't push any layout around
// or be clipped by a panel's overflow.
//
// Shared primitive (0140): both faceplates re-implemented this verbatim —
// VXN1's `bridge.js` `valuePop` and VXN2's `fader.js`
// `ensurePop/showPop/updatePop/hidePop`. Lifted here so there is one
// singleton + one `.value-pop` CSS ruleset (see `value-pop.css`).
//
// Authored as an ES module so the Node/vitest suites can pull `valuePop` in
// directly; the ESM marker is stripped at splice time (the synths concat every
// module into one inline `<script>` where module syntax is illegal) — see
// `strip_esm_exports` in the crate's `lib.rs`. The singleton's <div> is
// created lazily on first `show` so importing the module (e.g. only for the
// cutoff helpers) doesn't touch the DOM until a control actually needs it.
const valuePop = (() => {
  let el = null;
  function ensure() {
    if (el) return el;
    el = document.createElement('div');
    el.className = 'value-pop';
    document.body.appendChild(el);
    return el;
  }
  return {
    show(text, clientX, clientY) {
      const e = ensure();
      e.textContent = text;
      e.style.left = (clientX + 12) + 'px';
      e.style.top  = (clientY - 8)  + 'px';
      e.style.display = 'block';
    },
    update(text) { if (el) el.textContent = text; },
    hide() { if (el) el.style.display = 'none'; },
  };
})();

// Filter "Cutoff Tuned" mode math — shared primitive (0140).
//
// When a filter-cutoff fader is in tuned mode its range is read/displayed as
// a musical note over MIDI C0..C4 (12..60), semitone-snapped, while the
// stored param stays Hz so the DSP and DAW automation are unaffected (the
// engine never reads the toggle). Both faceplates had drifting three-way
// copies of these helpers — VXN1 `panels.js`, VXN2 `main.js` ("Mirrors
// VXN-1's panels.js") and VXN2 `bootstrap.js` (the bare `noteName`). One
// module now owns them.
//
// ES module so the vitest suites can `import` the pure helpers and assert
// the `cutoffTunedNormToHz` / `hzToMidi` round-trip directly; the `export`
// markers are stripped at splice time (see `strip_esm_exports`).

// Fader range: MIDI C0..C4, C2 at the midpoint.
const CUTOFF_TUNED_MIDI_MIN = 12; // C0
const CUTOFF_TUNED_MIDI_MAX = 60; // C4

function midiToHz(m) {
  return 440 * Math.pow(2, (m - 69) / 12);
}
function hzToMidi(hz) {
  return 69 + 12 * Math.log2(Math.max(1e-6, hz) / 440);
}

// MIDI note number → name (e.g. 60 → "C4"). General-purpose: `Math.round`
// tolerates a fractional MIDI value. Replaces VXN1's `keysNoteName` and the
// two VXN2 `noteName` copies.
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
function noteName(m) {
  const n = Math.round(m);
  return NOTE_NAMES[((n % 12) + 12) % 12] + (Math.floor(n / 12) - 1);
}

// norm [0,1] → MIDI 12..60 (semitone-snapped) → Hz.
function cutoffTunedNormToHz(norm) {
  const span = CUTOFF_TUNED_MIDI_MAX - CUTOFF_TUNED_MIDI_MIN;
  const midi = Math.round(CUTOFF_TUNED_MIDI_MIN + Math.max(0, Math.min(1, norm)) * span);
  return midiToHz(midi);
}
function cutoffTunedHzToNorm(hz) {
  const midi = Math.max(
    CUTOFF_TUNED_MIDI_MIN,
    Math.min(CUTOFF_TUNED_MIDI_MAX, Math.round(hzToMidi(hz))),
  );
  return (midi - CUTOFF_TUNED_MIDI_MIN) / (CUTOFF_TUNED_MIDI_MAX - CUTOFF_TUNED_MIDI_MIN);
}
function cutoffTunedNoteName(hz) {
  const midi = Math.max(
    CUTOFF_TUNED_MIDI_MIN,
    Math.min(CUTOFF_TUNED_MIDI_MAX, Math.round(hzToMidi(hz))),
  );
  return noteName(midi);
}

// Pointer-drag lifecycle primitive — shared by both faceplates (0140).
//
// Both synths re-implemented the pointerdown → setPointerCapture → move →
// up/cancel choreography ≥4× with observable drift (VXN1 `wireDrag`, VXN2
// `fader.create` / `fader.createBipolar` / `knob.bindDrag`, plus the op-row
// KS-handle drags). This is the one owner.
//
// `wireDrag(el, geometry, callbacks)` owns the *mechanics*: hover vs drag
// state, pointer capture, the `dragging` class, optional rAF-throttling of
// moves, an optional hit-exclude predicate (so a press on a click-to-select
// child isn't a drag), and an optional inner target element. Two value
// models share the same `onMove(ev, payload)` seam:
//
//   • ABSOLUTE — pass `pointerToValue(ev, ctx)`; `payload` is its return
//     value, verbatim. VXN1's position-mapped faders / wave knob use this;
//     the contract is unchanged from the original `wireDrag`.
//   • RELATIVE — pass `axis: 'x' | 'y'` and no `pointerToValue`; `payload`
//     is `{ dx, dy, ctx }`, the signed pixel delta since the grab point,
//     already scaled by `shift` (default 0.1) while Shift is held. VXN2's
//     accumulate-from-grab faders / knob use this.
//
// Per-control side effects (gesture brackets, the `dataset.dragging`
// echo-gate) stay in the caller's `onDown` / `onUp` — they aren't universal.
//
// ES module so the vitest suites can pull `wireDrag` in directly; the ESM
// marker is stripped at splice time (see `strip_esm_exports`).
function wireDrag(
  el,
  {
    pointerToValue,        // (ev, ctx) => value — ABSOLUTE model; omit for RELATIVE
    downContext,           // (ev) => ctx, stashed once on pointerdown and passed to every map call
    target = el,           // element the listeners + pointer capture attach to (e.g. an inner <svg>)
    excludeHit = null,     // selector string | (ev) => bool — pointerdown on a match is ignored (click-to-select)
    axis = null,           // 'x' | 'y' — enables the RELATIVE delta payload (informational; both axes are reported)
    shift = 0.1,           // fine-drag multiplier applied to the whole delta-since-grab while Shift is held
    raf = false,           // throttle moves to one requestAnimationFrame; the trailing edit flushes on pointerup
    preventDefault = true,
  } = {},
  { onEnter, onDown, onMove, onUp, onLeave, onDoubleClick } = {},
) {
  void axis; // documents the relative model at the call site; the payload always carries both dx/dy
  let dragging = false;
  let hovered = false;
  let ctx = null;
  let startX = 0;
  let startY = 0;
  let pendingEv = null; // latest move event awaiting an rAF flush
  let rafScheduled = false;

  function hitExcluded(ev) {
    if (!excludeHit) return false;
    if (typeof excludeHit === 'function') return excludeHit(ev);
    return ev.target instanceof Element && !!ev.target.closest(excludeHit);
  }

  // RELATIVE payload: signed delta from the grab point, shift-scaled.
  function dragInfo(ev) {
    const sens = ev.shiftKey ? shift : 1;
    return { dx: (ev.clientX - startX) * sens, dy: (ev.clientY - startY) * sens, ctx };
  }
  function mapValue(ev) {
    return pointerToValue ? pointerToValue(ev, ctx) : dragInfo(ev);
  }
  function fireMove(ev) {
    if (onMove) onMove(ev, mapValue(ev));
  }
  function flush() {
    rafScheduled = false;
    if (pendingEv) {
      const ev = pendingEv;
      pendingEv = null;
      fireMove(ev);
    }
  }

  target.addEventListener('pointerenter', (ev) => {
    if (dragging) return;
    hovered = true;
    if (onEnter) onEnter(ev);
  });
  target.addEventListener('pointerleave', () => {
    hovered = false;
    if (!dragging && onLeave) onLeave();
  });
  target.addEventListener('pointerdown', (ev) => {
    if (ev.button !== undefined && ev.button !== 0) return; // primary button only
    if (hitExcluded(ev)) return;
    if (preventDefault) ev.preventDefault();
    dragging = true;
    startX = ev.clientX;
    startY = ev.clientY;
    ctx = downContext ? downContext(ev) : null;
    target.classList.add('dragging');
    if (target.setPointerCapture && ev.pointerId !== undefined) {
      try { target.setPointerCapture(ev.pointerId); } catch (_) {}
    }
    if (onDown) onDown(ev, mapValue(ev));
  });
  target.addEventListener('pointermove', (ev) => {
    if (!dragging || !onMove) return;
    if (preventDefault) ev.preventDefault();
    if (raf) {
      pendingEv = ev;
      if (!rafScheduled) {
        rafScheduled = true;
        window.requestAnimationFrame(flush);
      }
    } else {
      fireMove(ev);
    }
  });
  const end = (ev) => {
    if (!dragging) return;
    if (preventDefault) ev.preventDefault();
    // Flush the trailing throttled edit unthrottled so tap-and-release is crisp.
    if (raf && pendingEv) {
      const last = pendingEv;
      pendingEv = null;
      rafScheduled = false;
      fireMove(last);
    }
    dragging = false;
    target.classList.remove('dragging');
    if (target.releasePointerCapture && ev.pointerId !== undefined) {
      try { target.releasePointerCapture(ev.pointerId); } catch (_) {}
    }
    if (onUp) onUp(ev);
    if (!hovered && onLeave) onLeave();
  };
  target.addEventListener('pointerup', end);
  target.addEventListener('pointercancel', end);
  if (onDoubleClick) {
    target.addEventListener('dblclick', (ev) => {
      if (preventDefault) ev.preventDefault();
      onDoubleClick(ev);
    });
  }
  return {
    isDragging: () => dragging,
    isHovered: () => hovered,
  };
}

// as soon as `set_parent` registers it — that's often before the inline

const _earlyViewEvents = [];
// `_post` is the one place that constructs the wire object. Senders below
// are thin façades; a future debug-log or batching hook is a one-line
// change here.
function _post(msg) {
  try { window.ipc.postMessage(JSON.stringify(msg)); }
  catch (e) { console.warn('vxn.send failed', e); }
}

// set_param_norm / reset_layer / set_key_mode / set_split_point) fire every
// registered callback after posting. This replaces the old preset-bar
// monkey-patch that reassigned the shared sender methods to flip a dirty flag:
// `window.vxn.onMutation(cb)` is a first-class, additive hook in the dispatch
// layer, so a subscriber composes instead of overwriting (and can't silently
// drop a prior patcher's side effect). View-only / transport sends (gestures,
// preset load, text input, ready) deliberately don't fire it.
const _mutationHooks = [];
function _mutated() {
  for (const cb of _mutationHooks) {
    try { cb(); } catch (e) { console.warn('vxn.onMutation hook failed', e); }

}

// Batched bridge entry point. `init()` replaces this with the real dispatcher
// once model.controls is built; until then, every event in the batch is buffered.
// `applyPresetCorpus` is the 0050 corpus-snapshot entry point; same buffer
// pattern — the latest snapshot held until the browser panel is alive to
// consume it.
let _earlyPresetCorpus = null;
window.__vxn = {
  applyViewEvents: function (arr) {
    for (const ev of arr) _earlyViewEvents.push(ev);
  },
  applyPresetCorpus: function (snap) { _earlyPresetCorpus = snap; },
};

// ─── Constants ─────────────────────────────────────────────────────────────

// Status-pill visibility window. Re-fired messages reset the timer so a
// rapid burst stays readable; the CSS fade transition handles the dismount.
const STATUS_PILL_FLASH_MS = 3000;

// ─── Floating text-input popup bridge (0048) ───────────────────────────────
//
// `window.vxn.promptText(title, initial, cb)` posts a `request_text_input`
// UiEvent and stashes `cb` in `_textInputCallbacks` keyed by a fresh id.
// Rust opens a native NSWindow (macOS) outside the host's NSEvent monitor
// scope, so Space and friends work as text input rather than transport.
// On commit / cancel the controller emits a `text_input_result` ViewEvent;
// the dispatcher looks up `id` and fires the matching callback exactly
// once. `value` is `null` on Esc / click outside, a string on Enter.
const _textInputCallbacks = new Map();
let _textInputCounter = 0;
window.vxn.promptText = function (title, initial, cb) {
  const id = 'ti' + (++_textInputCounter);
  _textInputCallbacks.set(id, cb);
  window.vxn.send.requestTextInput(id, title || '', initial || '');
};

// Register a callback fired on every engine-mutating send (0141). The preset
// bar uses it for dirty-tracking; see the `_mutated` chokepoint above.
window.vxn.onMutation = function (cb) {
  if (typeof cb === 'function') _mutationHooks.push(cb);
};

// `valuePop` (the floating value popup singleton) moved to the shared
// `vxn-core-ui-web/assets/value-pop.js` (0140); it's spliced ahead of this
// module, so its top-level binding is already in scope for `attachValuePop`
// in panels.js.

// ─── Status pill (0046, repositioned in 0049) ──────────────────────────────
//
// Inline chip in the preset bar, right of the current preset name. The
// markup lives in faceplate.html so the bar layout is one HTML edit, not
// JS-built; this IIFE just binds and exposes a `.flash(text)` API.
// `Status { line }` ViewEvents flash for ~3s then fade (CSS transition).
// Re-fired messages reset the timer so a rapid burst stays readable.
const statusPill = (() => {
  const el = document.getElementById('pbar-status');
  let timer = null;
  return {
    flash(text) {
      if (!el) return;
      el.textContent = text;
      el.classList.add('visible');
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => el.classList.remove('visible'), STATUS_PILL_FLASH_MS);
    },
  };
})();

// Shared preset browser — floating two-pane folders/presets panel.
//
// Synth-agnostic: it speaks only the shared preset corpus shape (from
// `corpus_snapshot_json`) and the shared opcode vocabulary, and is wired to a
// host via an injected adapter, so VXN1 and VXN2 embed the same code with
// different bridges. Each synth's faceplate crate splices this file (ESM
// markers stripped) into its inline <script>, then a tiny per-synth glue
// calls `createPresetBrowser(cfg)` and registers the result where its bridge
// expects it.
//
// Features: two-pane FACTORY categories + USER folders / presets, flat
// case-insensitive search with origin labels, right-click context menu
// (Rename / Delete / Move-to ▸ on user presets; Rename / Delete on named
// folders), "+ New" folder, HTML5 drag-and-drop preset→folder, delete-confirm
// + Save-As (name + folder dropdown) modals, and follow-path after move/rename.
//
// cfg: {
//   send: { loadFactory(index), loadUser(path), renamePreset(path,newName),
//           deletePreset(path), movePreset(path,destFolder|null),
//           renameFolder(old,new), deleteFolder(name), newFolder(suggested),
//           savePreset(name, folder|null) },
//   promptText: (title, initial, cb) => void,   // cb(value|null)
//   faceplateRoot: () => Element,               // modal mount target
// }
//
// The DOM contract is fixed element ids (both synths use them):
//   #browser-panel #browser-backdrop #browser-folders #browser-presets
//   #browser-search-input #browser-search-clear #browser-close
// `bind(root)` resolves them within `root || document` and wires listeners.

const UNCATEGORISED = 'Uncategorised';

// Map a folder name to the <select> value used in Save As. The virtual root
// has no real name; sentinel it as `__root__`.
function folderValue(name) {
  return name == null ? '__root__' : name;
}

// The splice loader drops these `import` lines for the inline `<script>` (the
// stripped shared bindings are spliced ahead of this module via the bridge
// slot, so `valuePop` / `wireDrag` are already in scope); under Node ESM the
// bindings resolve through the shared modules so the suites can exercise the
// helpers. The panels.js barrel re-exports everything here so tests that pull
// these from `../panels.js` keep working.



// One detent = one variant step. The drag sensitivity: pixels of vertical
// pointer travel per detent. ~30 feels close to hardware knobs.
const PIXELS_PER_DETENT = 30;

// Smoothing transition on the wave-knob indicator. Long enough that
// automation moves don't strobe between detents; short enough that drag
// still feels responsive.
const KNOB_INDICATOR_TRANSITION_MS = 120;

// Thin wrapper: the fader-shaped controls (Fader, DetuneLegato) all want
// the same vertical [0, 1] norm.
function wireFaderDrag(fader, callbacks) {
  const pointerToValue = (ev) => {
    const r = fader.getBoundingClientRect();
    return Math.max(0, Math.min(1, 1 - (ev.clientY - r.top) / r.height));
  };
  return wireDrag(fader, { pointerToValue }, callbacks);
}

// Attaches the floating value popup's lifecycle to a control. `getLabel()`
// returns the current display string. The host control invokes the
// `markX` methods from its drag callbacks; `refresh()` runs on the
// ParamChanged echo. `host` is any object with `isHovered()` and
// `isDragging()` getters (the `wireFaderDrag` return value, or a shim
// over makeWave's local vars).
function attachValuePop(host, getLabel) {
  return {
    markEntered(ev) {
      if (host.isDragging()) return;
      valuePop.show(getLabel(), ev.clientX, ev.clientY);
    },
    markLeft() {
      if (!host.isDragging()) valuePop.hide();
    },
    markGrabbed(ev) {
      valuePop.show(getLabel(), ev.clientX, ev.clientY);
    },
    markReleased() {
      if (!host.isHovered()) valuePop.hide();
    },
    refresh() {
      if (host.isHovered() || host.isDragging()) {
        valuePop.update(getLabel());
      }
    },
  };
}

// Paint a vertical fader's thumb at a [0, 1] norm. Norm 0 = bottom, 1 = top.
// Pins in pixel space against the live element height so the thumb's
// bounding box stays inside `.ctl-fader` exactly at both ends regardless of
// `--fader-h` / `--thumb-h` tweaks. Also sets `--fader-norm` for dependent
// CSS (track fill colour, etc).
function paintFader(fader, thumb, norm) {
  const halfThumb = thumb.offsetHeight / 2;
  const travel = fader.clientHeight - thumb.offsetHeight;
  const n = Math.max(0, Math.min(1, norm));
  thumb.style.top = (halfThumb + (1 - n) * travel) + 'px';
  fader.style.setProperty('--fader-norm', n);

// Plain → variant index clamp. Round to nearest, clamp to [0, len - 1].
// The four enum-shaped primitives (Switch, ButtonGroup, Dropdown, Wave-
// knob drag) all need exactly this.
function clampVariant(plain, variants) {
  return Math.max(0, Math.min(variants.length - 1, Math.round(plain)));

// `tgRow(name)` returns a fresh `.ctl-tg-row` containing the box + label
// pair. `tgRow(name, { mount })` instead fills the supplied target and
// returns it — used by composites whose container is already classed
// (`.ctl-detune-legato.ctl-tg-row`) and need to drop the same inner markup
// in place.
function tgRow(name, opts) {
  const target = (opts && opts.mount) || document.createElement('div');
  if (!opts || !opts.mount) target.className = 'ctl-tg-row';
  target.innerHTML =
    '<div class="ctl-tg-box"></div>' +
    '<div class="ctl-tg-lbl">' + name.toUpperCase() + '</div>';
  return target;

// panels/fader.js — the continuous / fader-family controls: the vertical
// fader, the LFO-rate subdivision label, the rotary waveform knob, and the
// Detune+Legato composite, plus the waveform glyph polylines they draw.
// Split out of the panels.js god-file in ticket 0141.
//
// `import` lines are dropped by the splice loader (the shared bindings ride
// the bridge slot; the sibling helpers are concatenated in the same scope);
// under Node ESM they resolve so the suites can pull these in via the
// `../panels.js` barrel. `variantIdx` is a concat-global from dispatch.js
// (referenced only inside `makeDetuneLegato`, at editor-ready time).






// ─── Waveform glyph polylines ──────────────────────────────────────────────
//
// In a [0, 1]² box (y down). Ported from `wave_points` in
// vxn-ui-vizia/src/lib.rs — coordinates only, no SVG-specific tweaks.
const WAVE_GLYPHS = {
  'Sine': (() => {
    const pts = [];
    for (let k = 0; k <= 16; k++) {
      const t = k / 16;
      pts.push([t, 0.5 - 0.38 * Math.sin(t * Math.PI * 2)]);
    }
    return pts;
  })(),
  'Triangle': [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Tri':      [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Saw':      [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw+':     [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw-':     [[0, 0.15], [0.5, 0.85], [0.5, 0.15], [1, 0.85]],
  'Pulse':    [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'Square':   [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'S&H':      [[0, 0.6], [0.28, 0.6], [0.28, 0.2], [0.56, 0.2], [0.56, 0.8], [0.82, 0.8], [0.82, 0.45], [1, 0.45]],
};

function glyphPath(label, w, h) {
  const pts = WAVE_GLYPHS[label];
  if (!pts) return null;
  return pts.map((p, i) =>
    (i === 0 ? 'M' : 'L') + (p[0] * w).toFixed(2) + ' ' + (p[1] * h).toFixed(2)
  ).join(' ');
}

// ─── Control primitives ────────────────────────────────────────────────────

// Detune ceiling in Twin assign mode (cents). Twin's "useful" range is
// purely a view convention — the engine doesn't enforce it, so the
// editor that surfaces the mode is the one that has to clamp. Mirrors
// vxn_ui_vizia::TWIN_DETUNE_CT (retired in 0054 but the value is still
// load-bearing).
const TWIN_TOP_CT = 20.0;

function makeFader(el, id, desc, opts) {
  const noLabel = el.hasAttribute('data-no-label');
  const label = el.dataset.label || desc.label;
  const displayOverride = (opts && opts.displayOverride) || null;
  // Optional hooks for faders whose mapping/display swap with a partner
  // toggle (LFO rate ↔ sync, Cutoff ↔ Tuned). `interactionOverride(n)`
  // returns `{plain, norm}` to swap the drag-write path (sends plain Hz
  // instead of raw norm); `normOverride(plain)` returns a thumb norm
  // computed from the param's plain value, bypassing the descriptor
  // taper. Both return null to fall through to the default behaviour.
  const interactionOverride = (opts && opts.interactionOverride) || null;
  const normOverride = (opts && opts.normOverride) || null;
  el.innerHTML = `
    ${noLabel ? '' : `<div class="ctl-label">${label.toUpperCase()}</div>`}
    <div class="ctl-fader">
      <div class="ctl-fader-track"></div>
      <div class="ctl-fader-thumb"></div>
    </div>
  `;
  const fader = el.querySelector('.ctl-fader');
  const thumb = el.querySelector('.ctl-fader-thumb');
  let lastDisplay = '';

  const writeFromDrag = (rawNorm) => {
    const o = interactionOverride && interactionOverride(rawNorm);
    if (o) {
      paintFader(fader, thumb, o.norm);
      window.vxn.send.setParam(id, o.plain);
    } else {
      paintFader(fader, thumb, rawNorm);
      window.vxn.send.setParamNorm(id, rawNorm);
    }
  };

  let drag;
  const pop = attachValuePop({
    isHovered:  () => drag.isHovered(),
    isDragging: () => drag.isDragging(),
  }, () => lastDisplay);
  drag = wireFaderDrag(fader, {
    onEnter: (ev) => pop.markEntered(ev),
    onLeave: () => pop.markLeft(),
    onDown: (ev, n) => {
      window.vxn.send.beginGesture(id);
      writeFromDrag(n);
      pop.markGrabbed(ev);                                // re-anchor at the grab point
    },
    onMove: (_ev, n) => writeFromDrag(n),
    onUp: () => {
      window.vxn.send.endGesture(id);
      pop.markReleased();
    },
  });

  return {
    update(plain, norm, display) {
      // ViewEvent echo — always position the thumb so DAW automation
      // moves it even mid-drag (engine value is authoritative). During a
      // drag the local pointermove `paintFader` and the round-trip echo
      // converge on the same value, so the thumb stays glued to the
      // cursor without flicker.
      const overriddenNorm = normOverride && normOverride(plain);
      paintFader(fader, thumb, overriddenNorm != null ? overriddenNorm : norm);
      // Synced LFO rates swap the Hz readout for a subdivision label
      // (0042). The override is null for every other fader, so this
      // collapses to the plain path.
      let label = display;
      if (displayOverride) {
        const o = displayOverride(plain, norm, display);
        if (o != null) label = o;
      }
      lastDisplay = label;
      pop.refresh();
    },
  };
}

// Map a normalised fader position (linear `[0, 1]`) to the matching
// subdivision label. The LFO rate fader's `norm` is the linear range
// position (`get_normalized`, not the exp-tapered fader-position); since
// `vxn_app::sync::index_from_norm` only ever takes the slider's `0..1`,
// either convention agrees on the index — the table is just spread evenly
// across the travel.
function subdivisionLabel(norm) {
  const t = window.vxn.subdivisions || [];
  if (t.length === 0) return '';
  const last = t.length - 1;
  const n = Math.max(0, Math.min(1, norm));
  return t[Math.max(0, Math.min(last, Math.round(n * last)))];
}

// ─── Rotary waveform knob ──────────────────────────────────────────────────
//
// Single SVG: knob face + rotating indicator + glyph labels spread around
// a 270° arc with the gap at the bottom (clamped knob, no wrap). Drag
// rotation = vertical pointer motion (up = CW, down = CCW), clamped at
// endpoints, snapped to the nearest detent. Click a glyph for direct
// selection.
//
// Variant angles are evenly distributed across ARC_START..ARC_END, so the
// 4-variant Osc knob still lands its glyphs at SW/NW/NE/SE (the corners
// of -135°…+135° "from up CW") while the 6-variant LFO shape fits without
// crowding the corners. Indicator angle is the same affine function of
// value, so the CSS transition always sweeps along the populated arc.
//
// **Future**: when intermediate / cross-fade waveforms ship, this becomes
// a continuous `[0, N)` knob with wrap-around. The angle math already
// works for fractional values; only the drag clamp + glyph-active logic
// need a `wrap: true` branch.
const SVG_NS = 'http://www.w3.org/2000/svg';

function makeWave(el, id, desc) {
  const label = el.dataset.label || desc.label;
  const variants = desc.variants || [];
  el.innerHTML = `<div class="ctl-label">${label.toUpperCase()}</div>`;

  const size = 64;
  const cx = size / 2, cy = size / 2;
  const knobR = 13;
  const glyphR = 26;
  const glyphW = 14, glyphH = 10;

  // 270° arc with a 90° gap at the bottom. Angles measured in degrees CW
  // from "straight up" (0°), so -135° = SW corner, +135° = SE.
  const ARC_START = -135;
  const ARC_SWEEP = 270;
  const N = variants.length;
  const STEP_DEG = N > 1 ? ARC_SWEEP / (N - 1) : 0;
  const variantDeg = (i) => ARC_START + i * STEP_DEG;

  let value = 0;
  let displayedAngle = variantDeg(0);
  let lastDisplay = variants[0] || '';

  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.classList.add('ctl-wave');
  el.appendChild(svg);

  // Glyph labels along the arc. Transparent rect behind the path makes
  // the whole label area clickable, not just the stroked pixels.
  const glyphEls = variants.map((name, i) => {
    const a = variantDeg(i) * Math.PI / 180;
    const gx = cx + glyphR * Math.sin(a);
    const gy = cy - glyphR * Math.cos(a);
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform',
      `translate(${(gx - glyphW / 2).toFixed(2)} ${(gy - glyphH / 2).toFixed(2)})`);
    g.setAttribute('cursor', 'pointer');

    const hit = document.createElementNS(SVG_NS, 'rect');
    hit.setAttribute('x', -3); hit.setAttribute('y', -3);
    hit.setAttribute('width',  glyphW + 6);
    hit.setAttribute('height', glyphH + 6);
    hit.setAttribute('fill', 'transparent');
    g.appendChild(hit);

    const path = document.createElementNS(SVG_NS, 'path');
    const d = glyphPath(name, glyphW, glyphH);
    if (d) {
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-width', 1.4);
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
    }
    g.appendChild(path);

    g.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      window.vxn.send.discrete(id, i);
    });

    svg.appendChild(g);
    return { g, path, name };
  });

  // Knob face: rim + inner dimple, both purely visual.
  const rim = document.createElementNS(SVG_NS, 'circle');
  rim.setAttribute('cx', cx); rim.setAttribute('cy', cy);
  rim.setAttribute('r', knobR);
  rim.setAttribute('fill', 'var(--knob-face)');
  rim.setAttribute('stroke', 'var(--knob-rim)');
  rim.setAttribute('stroke-width', 1);
  svg.appendChild(rim);

  const dimple = document.createElementNS(SVG_NS, 'circle');
  dimple.setAttribute('cx', cx); dimple.setAttribute('cy', cy);
  dimple.setAttribute('r', knobR * 0.62);
  dimple.setAttribute('fill', 'var(--knob-dimple)');
  dimple.setAttribute('stroke', 'var(--knob-dimple-rim)');
  dimple.setAttribute('stroke-width', 0.5);
  svg.appendChild(dimple);

  // Rotating indicator — a line from centre to rim, rotated by a <g>.
  // CSS transition smooths automation moves between detents.
  const indicatorG = document.createElementNS(SVG_NS, 'g');
  indicatorG.setAttribute('transform-origin', `${cx} ${cy}`);
  indicatorG.style.transition = `transform ${KNOB_INDICATOR_TRANSITION_MS}ms ease-out`;
  const indicator = document.createElementNS(SVG_NS, 'line');
  indicator.setAttribute('x1', cx); indicator.setAttribute('y1', cy);
  indicator.setAttribute('x2', cx); indicator.setAttribute('y2', cy - knobR + 2);
  indicator.setAttribute('stroke', 'var(--knob-indicator)');
  indicator.setAttribute('stroke-width', 2);
  indicator.setAttribute('stroke-linecap', 'round');
  indicatorG.appendChild(indicator);
  svg.appendChild(indicatorG);

  // ── Hover + vertical-drag rotation (no wrap) ───────────────────────────
  // Glyph hits stopPropagation; the knob face falls through to wireDrag.
  // `downContext` stashes the pixel anchor + the value at grab-time so the
  // pointer-to-value map is delta-based, not absolute.
  // `pop` is forward-declared because the drag callbacks reference it but
  // `attachValuePop` needs the drag's hover/drag getters as its host.
  let pop;
  const drag = wireDrag(svg, {
    downContext: (ev) => ({ y0: ev.clientY, v0: value }),
    pointerToValue: (ev, ctx) =>
      clampVariant(ctx.v0 + (ctx.y0 - ev.clientY) / PIXELS_PER_DETENT, variants),
  }, {
    onEnter: (ev) => pop.markEntered(ev),
    onLeave: () => pop.markLeft(),
    onDown:  (ev) => {
      window.vxn.send.beginGesture(id);
      pop.markGrabbed(ev);
    },
    onMove:  (_ev, v) => {
      if (v !== value) window.vxn.send.setParam(id, v);
    },
    onUp:    () => {
      window.vxn.send.endGesture(id);
      pop.markReleased();
    },
  });
  pop = attachValuePop(drag, () => lastDisplay);

  function applyValue(v, display) {
    value = v;
    displayedAngle = variantDeg(v);
    indicatorG.setAttribute('transform', `rotate(${displayedAngle.toFixed(2)})`);
    glyphEls.forEach((g, i) => {
      g.path.setAttribute('stroke',
        i === v ? 'var(--glyph-active)' : 'var(--glyph)');
    });
    lastDisplay = display;
    pop.refresh();
  }

  // Seed the initial pose so the indicator + active-glyph state are right
  // before the first ParamChanged echo lands.
  applyValue(0, variants[0] || '');

  return {
    update(plain, norm, display) {
      const v = clampVariant(plain, variants);
      applyValue(v, display);
    },
  };
}

// ─── Detune + Legato composite (Voice panel, 0045) ─────────────────────────
//
// Two params + one watch in a single column: the Detune fader on top and
// the Legato toggle beneath it, both driven by Assign Mode for visual hints
// (dim Legato in Poly/Twin) and behaviour (Detune fader's full-travel
// meaning is 50 ct in Unison vs 20 ct in Twin — mirrors
// `vxn_ui_vizia::detune_top`). Plain values stay in descriptor units (0–50
// ct); only the fader's [0,1] → cents map changes per mode.
//

// cell pairs with; both are resolved per layer at bind time so a layer
// rebind (0045) rebuilds the cell with the new ids.
function makeDetuneLegato(el, ids, descs, modeName, layer) {
  const { detune, legato, mode } = ids;
  const label = el.dataset.label || descs.detune.label;
  el.classList.add('ctl-detune');
  el.innerHTML =
    '<div class="ctl-label">' + label.toUpperCase() + '</div>' +
    '<div class="ctl-detune-body">' +
      '<div class="ctl-fader">' +
        '<div class="ctl-fader-track"></div>' +
        '<div class="ctl-fader-thumb"></div>' +
      '</div>' +
      '<div class="ctl-detune-legato ctl-tg-row"></div>' +
    '</div>';
  const fader = el.querySelector('.ctl-fader');
  const thumb = el.querySelector('.ctl-fader-thumb');
  const legatoRow = el.querySelector('.ctl-detune-legato');
  tgRow('LEGATO', { mount: legatoRow });

  const DESC_TOP = descs.detune.max;
  // Twin's variant index lives in the assign descriptor (current order:
  // Poly, Unison, Solo, Twin → index 3). Look it up by name so a reorder
  // in ASSIGN_LABELS doesn't desync.
  const lookupVariant = (name) => variantIdx(modeName, name, layer);
  const TWIN_IDX = lookupVariant('Twin');
  const MONO_IDXS = new Set();
  // Mono assign modes (Legato applies in these): Unison, Solo. Found by
  // name so an ASSIGN_LABELS reorder doesn't desync.
  ['Unison', 'Solo'].forEach((n) => {
    const i = lookupVariant(n);
    if (i >= 0) MONO_IDXS.add(i);
  });

  let lastDetunePlain = 0;
  let lastModePlain = 0;

  function currentTop() {
    return Math.round(lastModePlain) === TWIN_IDX ? TWIN_TOP_CT : DESC_TOP;
  }
  function setThumbFromPlain(plain) {
    const top = currentTop();
    paintFader(fader, thumb, top > 0 ? plain / top : 0);
  }

  let drag;
  let lastDetuneDisplay = null;
  const detuneLabel = () =>
    lastDetuneDisplay || (lastDetunePlain.toFixed(1) + ' ct');
  const pop = attachValuePop({
    isHovered:  () => drag.isHovered(),
    isDragging: () => drag.isDragging(),
  }, detuneLabel);
  drag = wireFaderDrag(fader, {
    onEnter: (ev) => pop.markEntered(ev),
    onLeave: () => pop.markLeft(),
    onDown: (ev, n) => {
      window.vxn.send.beginGesture(detune);
      const plain = n * currentTop();
      lastDetunePlain = plain;
      lastDetuneDisplay = plain.toFixed(1) + ' ct';
      setThumbFromPlain(plain);
      window.vxn.send.setParam(detune, plain);
      pop.markGrabbed(ev);
    },
    onMove: (_ev, n) => {
      const plain = n * currentTop();
      lastDetunePlain = plain;
      lastDetuneDisplay = plain.toFixed(1) + ' ct';
      setThumbFromPlain(plain);
      window.vxn.send.setParam(detune, plain);
      pop.refresh();
    },
    onUp: () => {
      window.vxn.send.endGesture(detune);
      pop.markReleased();
    },
  });

  legatoRow.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    const on = legatoRow.classList.contains('active') ? 0 : 1;
    window.vxn.send.discrete(legato, on);
  });
  // Double-click resets the detune fader (descriptor default).
  el.addEventListener('dblclick', (ev) => {
    ev.preventDefault();
    window.vxn.send.discrete(detune, descs.detune.default);
  });

  function applyLegatoDim() {
    legatoRow.classList.toggle('disabled', !MONO_IDXS.has(Math.round(lastModePlain)));
  }

  return {
    // The composite registers three model.controls entries (detune, legato, mode)
    // pointing at three updater closures returned here — `init()` then
    // routes each ParamChanged into the matching closure.
    detuneUpdate(plain, _norm, display) {
      lastDetunePlain = plain;
      lastDetuneDisplay = display || (plain.toFixed(1) + ' ct');
      setThumbFromPlain(plain);
      pop.refresh();
    },
    legatoUpdate(plain) {
      legatoRow.classList.toggle('active', plain >= 0.5);
    },
    modeUpdate(plain) {
      const prevTwin = Math.round(lastModePlain) === TWIN_IDX;
      lastModePlain = plain;
      // On entering Twin, clamp the stored detune down to the Twin ceiling
      // (mirrors `vxn_ui_vizia::clamp_detune_on_twin`). The engine doesn't
      // enforce this — Twin's "useful" range is purely a view convention,
      // so the editor that surfaces the mode is the one that has to clamp.
      if (!prevTwin && Math.round(plain) === TWIN_IDX && lastDetunePlain > TWIN_TOP_CT) {
        window.vxn.send.discrete(detune, TWIN_TOP_CT);
        lastDetunePlain = TWIN_TOP_CT;
      }
      setThumbFromPlain(lastDetunePlain);
      applyLegatoDim();
    },
  };
}

// `Switch(id, label)` — vertical toggle for bools; also handles 2-variant
